<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background Circle with gradient -->
  <defs>
    <linearGradient id="royalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1538;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D0E24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E4BA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dabbaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CD853F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
  
  <!-- Main background -->
  <circle cx="100" cy="100" r="88" fill="url(#royalGrad)"/>
  
  <!-- Traditional Dabba/Tiffin Box -->
  <!-- Base container -->
  <ellipse cx="100" cy="130" rx="45" ry="12" fill="url(#dabbaGrad)"/>
  <rect x="55" y="90" width="90" height="40" rx="5" fill="url(#dabbaGrad)"/>
  <ellipse cx="100" cy="90" rx="45" ry="12" fill="#DEB887"/>
  
  <!-- Lid -->
  <ellipse cx="100" cy="75" rx="40" ry="10" fill="url(#goldGrad)"/>
  <ellipse cx="100" cy="72" rx="35" ry="8" fill="#F4E4BA"/>
  
  <!-- Handle -->
  <path d="M85 65 Q100 45 115 65" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Steam wisps -->
  <path d="M80 55 Q78 45 82 38" fill="none" stroke="#F4E4BA" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M100 50 Q98 40 102 32" fill="none" stroke="#F4E4BA" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M120 55 Q122 45 118 38" fill="none" stroke="#F4E4BA" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Decorative dots -->
  <circle cx="70" cy="110" r="3" fill="#F4E4BA" opacity="0.6"/>
  <circle cx="100" cy="115" r="3" fill="#F4E4BA" opacity="0.6"/>
  <circle cx="130" cy="110" r="3" fill="#F4E4BA" opacity="0.6"/>
  
  <!-- Traditional pattern border -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#D4AF37" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  
  <!-- Text: THE DABBA -->
  <text x="100" y="160" text-anchor="middle" fill="#F4E4BA" font-family="Georgia, serif" font-size="14" font-weight="bold" letter-spacing="3">THE DABBA</text>
</svg>