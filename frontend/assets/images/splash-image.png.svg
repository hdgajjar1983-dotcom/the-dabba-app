<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF8F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5EDE4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="royalGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1538;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D0E24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E4BA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dabbaGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CD853F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer decorative ring -->
  <circle cx="200" cy="170" r="130" fill="none" stroke="url(#goldGrad2)" stroke-width="4"/>
  <circle cx="200" cy="170" r="122" fill="none" stroke="url(#goldGrad2)" stroke-width="1.5"/>
  
  <!-- Main background -->
  <circle cx="200" cy="170" r="116" fill="url(#royalGrad2)"/>
  
  <!-- Traditional Dabba/Tiffin Box -->
  <ellipse cx="200" cy="220" rx="60" ry="16" fill="url(#dabbaGrad2)"/>
  <rect x="140" y="160" width="120" height="60" rx="8" fill="url(#dabbaGrad2)"/>
  <ellipse cx="200" cy="160" rx="60" ry="16" fill="#DEB887"/>
  
  <!-- Lid -->
  <ellipse cx="200" cy="140" rx="52" ry="14" fill="url(#goldGrad2)"/>
  <ellipse cx="200" cy="136" rx="45" ry="11" fill="#F4E4BA"/>
  
  <!-- Handle -->
  <path d="M175 125 Q200 95 225 125" fill="none" stroke="url(#goldGrad2)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Steam wisps -->
  <path d="M170 110 Q166 90 172 75" fill="none" stroke="#F4E4BA" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M200 100 Q196 80 202 60" fill="none" stroke="#F4E4BA" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M230 110 Q234 90 228 75" fill="none" stroke="#F4E4BA" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Decorative dots on dabba -->
  <circle cx="160" cy="190" r="4" fill="#F4E4BA" opacity="0.7"/>
  <circle cx="200" cy="195" r="4" fill="#F4E4BA" opacity="0.7"/>
  <circle cx="240" cy="190" r="4" fill="#F4E4BA" opacity="0.7"/>
  
  <!-- Traditional pattern border -->
  <circle cx="200" cy="170" r="112" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.6"/>
  
  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" fill="#8B1538" font-family="Georgia, serif" font-size="36" font-weight="bold" letter-spacing="4">THE DABBA</text>
  <text x="200" y="350" text-anchor="middle" fill="#B8860B" font-family="Georgia, serif" font-size="14" letter-spacing="2">Gujarati Ghar Ka Swad</text>
</svg>