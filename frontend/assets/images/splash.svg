<?xml version="1.0" encoding="UTF-8"?>
<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B1538"/>
      <stop offset="100%" stop-color="#5D0E24"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F4E4BA"/>
      <stop offset="100%" stop-color="#C5A028"/>
    </linearGradient>
    <linearGradient id="dabbaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CD853F"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1284" height="2778" fill="url(#bgGrad)"/>
  
  <!-- Centered Logo -->
  <g transform="translate(392, 1039)">
    <!-- Outer decorative ring -->
    <circle cx="250" cy="250" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="8"/>
    <circle cx="250" cy="250" r="225" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    
    <!-- Main background circle -->
    <circle cx="250" cy="250" r="215" fill="url(#bgGrad)"/>
    
    <!-- Traditional Dabba/Tiffin Box -->
    <!-- Base container -->
    <ellipse cx="250" cy="325" rx="113" ry="30" fill="url(#dabbaGrad)"/>
    <rect x="137" y="225" width="226" height="100" rx="12" fill="url(#dabbaGrad)"/>
    <ellipse cx="250" cy="225" rx="113" ry="30" fill="#DEB887"/>
    
    <!-- Lid -->
    <ellipse cx="250" cy="188" rx="100" ry="26" fill="url(#goldGrad)"/>
    <ellipse cx="250" cy="180" rx="88" ry="21" fill="#F4E4BA"/>
    
    <!-- Handle -->
    <path d="M212 163 Q250 115 288 163" fill="none" stroke="url(#goldGrad)" stroke-width="11" stroke-linecap="round"/>
    
    <!-- Steam wisps -->
    <path d="M200 140 Q195 115 205 95" fill="none" stroke="#F4E4BA" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <path d="M250 125 Q245 100 255 80" fill="none" stroke="#F4E4BA" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <path d="M300 140 Q305 115 295 95" fill="none" stroke="#F4E4BA" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Decorative dots -->
    <circle cx="175" cy="275" r="8" fill="#F4E4BA" opacity="0.6"/>
    <circle cx="250" cy="290" r="8" fill="#F4E4BA" opacity="0.6"/>
    <circle cx="325" cy="275" r="8" fill="#F4E4BA" opacity="0.6"/>
    
    <!-- Traditional pattern border -->
    <circle cx="250" cy="250" r="208" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="10,10" opacity="0.5"/>
  </g>
  
  <!-- Text "THE DABBA" below logo -->
  <text x="642" y="1700" text-anchor="middle" fill="#F4E4BA" font-family="Georgia, serif" font-size="72" font-weight="bold" letter-spacing="12">THE DABBA</text>
  
  <!-- Tagline -->
  <text x="642" y="1780" text-anchor="middle" fill="#F4E4BA" font-family="Georgia, serif" font-size="32" opacity="0.8" letter-spacing="4">Premium Tiffin Service</text>
</svg>
